<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>對帳總覽 @Edda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1E3A5F;--blue:#2D7DD2;--blue-light:#EBF3FB;--blue-mid:#B8D4F0;
    --green:#1A9E5C;--green-light:#E8F8F0;--red:#E74C3C;--red-light:#FEF0EF;
    --orange:#E67E22;--orange-light:#FEF5EC;--purple:#7D3C98;--purple-light:#F5EEF8;
    --bg:#F7F9FC;--surface:#FFFFFF;--border:#D9E4F0;
    --text:#1A2840;--text-2:#4A6080;--text-3:#8BA0BA;
    --radius:10px;--shadow:0 2px 12px rgba(30,58,95,0.08);--shadow-md:0 4px 24px rgba(30,58,95,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

  /* ── Header ── */
  header{background:var(--navy);color:#fff;padding:0 28px;height:60px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:50}
  .logo{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:112.5%;flex-shrink:0}
  header h1{font-size:100%;font-weight:700}
  header .sub{font-size:75%;color:var(--blue-mid)}
  .hdr-back{margin-left:auto;font-size:75%;color:var(--blue-mid);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .15s;flex-shrink:0}
  .hdr-back:hover{color:#fff}

  /* ── Scope bar ── */
  .scope-bar{background:var(--surface);border-bottom:2px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .scope-label{font-size:75%;font-weight:700;color:var(--text-2);letter-spacing:.4px;white-space:nowrap}
  .scope-chips{display:flex;gap:8px;flex-wrap:wrap;flex:1}
  .scope-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:75%;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text-2);transition:all .15s;user-select:none}
  .scope-chip input{accent-color:var(--blue);width:13px;height:13px;cursor:pointer}
  .scope-chip.checked{background:var(--blue-light);border-color:var(--blue);color:var(--navy)}
  .scope-chip.has-unpaid{border-color:#f5b7b1}
  .scope-chip.has-unpaid.checked{background:var(--red-light);border-color:var(--red);color:var(--red)}

  /* ── Main ── */
  main{flex:1;padding:24px 28px;max-width:1100px;width:100%;margin:0 auto}

  /* ── Summary bar ── */
  .summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:24px}
  .s-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:12px 16px}
  .s-card .s-lbl{font-size:62.5%;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
  .s-card .s-val{font-size:118.75%;font-weight:700;color:var(--navy)}
  .s-card .s-sub{font-size:68.75%;color:var(--text-2);margin-top:3px}

  /* ══════════════════════════════════
     LEVEL 1 ── 主購（收款人）區塊
  ══════════════════════════════════ */
  .buyer-section{margin-bottom:28px}

  .buyer-header{
    display:flex;align-items:center;gap:14px;
    background:var(--navy);color:#fff;
    padding:14px 20px;border-radius:12px 12px 0 0;
  }
  .buyer-avatar{
    width:42px;height:42px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:106.25%;font-weight:800;color:var(--green-light);
    flex-shrink:0;border:3px solid rgba(255,255,255,.3);
  }
  .buyer-info{flex:1;min-width:0}
  .buyer-name{font-size:106.25%;font-weight:700;letter-spacing:.3px}
  .buyer-meta{font-size:75%;color:var(--blue-mid);margin-top:2px}
  .buyer-totals{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .buyer-total-item{text-align:right}
  .buyer-total-lbl{font-size:62.5%;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px}
  .buyer-total-val{font-size:112.5%;font-weight:700}
  .buyer-total-val.red{color:#ffb3ad}
  .buyer-total-val.green{color:#a8e6c8}

  .buyer-body{
    border:1.5px solid var(--border);border-top:none;
    border-radius:0 0 12px 12px;
    overflow:hidden;
    box-shadow:var(--shadow);
    padding:14px;
    background:var(--surface);
  }

  /* ── 主購統計帶 ── */
  .buyer-stats-strip{
    display:flex;gap:0;background:var(--bg);
    border-bottom:1px solid var(--border);
    overflow-x:auto;
  }
  .bss-item{
    flex:1;min-width:100px;padding:10px 16px;
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;gap:3px;
  }
  .bss-item:last-child{border-right:none}
  .bss-lbl{font-size:62.5%;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .bss-val{font-size:93.75%;font-weight:700;color:var(--navy)}

  /* ══════════════════════════════════
     LEVEL 2 ── 訂購人群組
  ══════════════════════════════════ */
  .orderer-group{border-bottom:none;margin-bottom:12px;border-radius:8px;overflow:hidden;background:var(--surface);border:1.5px solid var(--border);box-shadow:0 1px 4px rgba(30,58,95,0.04)}
  .orderer-group:last-child{margin-bottom:0}
  .orderer-group.all-paid{background:#FAFBFC;border-color:#D9E0E8;filter: grayscale(1);}
  .orderer-group.all-paid .orderer-header{background:#e1e1e1;border-bottom-color:#E8EEF6;color:#8BA0BA}
  .orderer-group.all-paid .orderer-name{color:#8BA0BA}
  .orderer-group.all-paid .orderer-paid-label{color:#6BA084}
  .orderer-group.all-paid .order-rows-wrap{background:#FAFBFC}
  .orderer-group.all-paid .rest-section{background:#F0F2F5;border-left-color:#B8C8D8}
  .orderer-group.all-paid .rest-header{background:#F0F2F5;border-bottom-color:#E0E8F0}
  .orderer-group.all-paid .rest-header-name{color:#8BA0BA}
  .orderer-group.all-paid .order-row{background:#FAFBFC;color:#8BA0BA}

  .orderer-header{
    display:flex;align-items:center;gap:10px;
    padding:12px 18px;
    background:var(--surface);
    border-bottom:2px solid var(--border);
  }
  .orderer-avatar{
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:81.25%;font-weight:700;color:#fff;flex-shrink:0;
  }
  .orderer-name{font-size:87.5%;font-weight:700;color:var(--navy);flex:1}
  .orderer-unpaid-amt{font-size:81.25%;font-weight:700;color:var(--red)}
  .orderer-paid-label{font-size:75%;color:var(--green);font-weight:600}

  /* ══════════════════════════════════
     LEVEL 3 ── 餐廳群組
  ══════════════════════════════════ */
  .rest-section{
    margin:0 0 8px 16px;
    border-left:4px solid var(--blue);
    border-radius:0 6px 6px 0;
    overflow:hidden;
    background:#F5F8FB;
  }
  .rest-section:last-child{margin-bottom:0}

  .rest-header{
    display:flex;align-items:center;gap:10px;
    padding:10px 16px;
    background:#F5F8FB;
    border-bottom:1px solid #E8EEF6;
  }
  .rest-header-icon{font-size:93.75%;flex-shrink:0}
  .rest-header-name{font-size:81.25%;font-weight:700;color:var(--navy);flex:1}
  .rest-header-badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .badge{display:inline-block;padding:2px 9px;border-radius:14px;font-size:68.75%;font-weight:600}
  .badge-unpaid{background:var(--red-light);color:var(--red)}
  .badge-paid  {background:var(--green-light);color:var(--green)}
  .badge-total {background:var(--blue-light);color:var(--blue)}

  /* ── 訂單列 ── */
  .order-rows-wrap{background:#fff;border-top:1px solid #E8EEF6}

  .order-row{
    display:flex;align-items:center;gap:10px;
    padding:8px 16px;
    border-bottom:1px solid #f0f3f8;
    transition:background .12s;
    background:#fff;
  }
  .order-row:last-child{border-bottom:none}
  .order-row:hover{background:#f9fbfd}
  .order-row.paid-row{background:#fafafa;opacity:1}
  .order-row.paid-row:hover{background:#f5f5f5}

  .or-date{font-size:75%;color:var(--text-3);padding:0;background:none;white-space:nowrap;flex-shrink:0;font-weight:400;min-width:75px}
  .or-items{flex:1;font-size:75%;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .or-note{font-size:68.75%;color:var(--text-3);white-space:nowrap;flex-shrink:0}
  .or-amt{font-size:81.25%;font-weight:700;color:var(--navy);white-space:nowrap;min-width:140px;text-align:right;flex-shrink:0}

  /* ── 操作按鈕 ── */
  .btn-pay{
    display:inline-flex;align-items:center;gap:4px;
    padding:4px 11px;border-radius:7px;
    border:1.5px solid #f5cba7;font-size:68.75%;font-weight:700;
    cursor:pointer;background:var(--orange-light);color:var(--orange);
    transition:all .15s;white-space:nowrap;flex-shrink:0;
  }
  .btn-pay:hover{background:var(--orange);color:#fff;border-color:var(--orange)}
  .btn-pay:active{transform:scale(.96)}
  .paid-label{
    font-size:68.75%;color:var(--green);font-weight:600;
    background:var(--green-light);padding:4px 10px;border-radius:7px;
    border:1.5px solid #a9dfbf;white-space:nowrap;flex-shrink:0;
  }

  .orderer-footer{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;
    background:#f9f9f9;
    border-top:1px solid #f0f3f8;
    gap:10px;flex-wrap:wrap;
  }
  .orderer-footer-left{font-size:75%;color:var(--text-2)}
  .orderer-footer-left strong{color:var(--red);font-size:87.5%}
  .btn-settle{
    padding:5px 14px;border-radius:8px;border:1.5px solid #a9dfbf;
    font-size:75%;font-weight:700;cursor:pointer;
    background:var(--green-light);color:var(--green);
    transition:all .15s;white-space:nowrap;
  }
  .btn-settle:hover{background:var(--green);color:#fff}

  /* ── Empty / Toast / Loading / Confirm ── */
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-3)}
  .empty-state .ei{font-size:275%;margin-bottom:14px}
  .empty-state p{font-size:87.5%}

  .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(15,30,55,.45);backdrop-filter:blur(2px);z-index:100;align-items:center;justify-content:center}
  .confirm-overlay.open{display:flex}
  .confirm-box{background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.18);width:100%;max-width:400px;padding:28px 28px 22px;animation:su .2s ease}
  @keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  .confirm-box h3{font-size:100%;font-weight:700;color:var(--navy);margin-bottom:10px}
  .confirm-box p{font-size:81.25%;color:var(--text-2);line-height:1.8;margin-bottom:18px}
  .confirm-amount{background:var(--green-light);border:1.5px solid #a9dfbf;border-radius:8px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .confirm-amount-lbl{font-size:75%;font-weight:600;color:var(--green)}
  .confirm-amount-val{font-size:125%;font-weight:700;color:var(--navy)}
  .confirm-btns{display:flex;justify-content:flex-end;gap:10px}
  .btn{padding:9px 18px;border-radius:8px;border:none;font-size:81.25%;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .btn:active{transform:scale(.97)}
  .btn-ghost{background:transparent;color:var(--blue);border:1.5px solid var(--blue-mid)}.btn-ghost:hover{background:var(--blue-light)}
  .btn-success{background:var(--green);color:#fff}.btn-success:hover{filter:brightness(1.1)}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:81.25%;font-weight:500;box-shadow:var(--shadow-md);z-index:200;transform:translateY(10px);opacity:0;transition:all .25s;pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.success{border-left:4px solid var(--green)}
  .toast.error  {border-left:4px solid var(--red)}

  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);backdrop-filter:blur(2px);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px}
  .loading-overlay.show{display:flex}
  .spinner{width:36px;height:36px;border:4px solid var(--blue-mid);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:81.25%;color:var(--text-2);font-weight:500}

  /* ═══════════════════════════════════════════
     RWD ── 平板 & 手機版本
  ═════════════════════════════════════════════ */
  @media (max-width: 1024px) {
    body{font-size:18px}
    header{padding:0 16px;height:56px;gap:10px}
    .logo{width:28px;height:28px;font-size:100%}
    header h1{font-size:93.75%}
    header .sub{font-size:68.75%}
    .hdr-back{font-size:68.75%;padding:6px 12px}
    
    .scope-bar{padding:8px 16px;gap:10px}
    .scope-label{font-size:68.75%}
    .scope-chip{font-size:68.75%;padding:4px 10px}
    
    main{padding:16px;max-width:100%}
    .summary-bar{grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px}
    .s-card{padding:10px 12px}
    .s-card .s-lbl{font-size:56.25%;margin-bottom:3px}
    .s-card .s-val{font-size:106.25%}
    .s-card .s-sub{font-size:62.5%;margin-top:2px}
    
    .buyer-section{margin-bottom:16px}
    .buyer-header{padding:10px 14px;gap:10px}
    .buyer-avatar{width:36px;height:36px;font-size:93.75%}
    .buyer-name{font-size:93.75%}
    .buyer-meta{font-size:68.75%;margin-top:1px}
    .buyer-totals{gap:12px;margin-top:8px;width:100%}
    .buyer-total-item{flex:1;min-width:0}
    .buyer-total-lbl{font-size:56.25%}
    .buyer-total-val{font-size:100%}
    
    .orderer-group{margin-bottom:10px;border-radius:6px}
    .orderer-header{padding:10px 14px}
    .orderer-avatar{width:28px;height:28px;font-size:75%}
    .orderer-name{font-size:81.25%}
    .orderer-unpaid-amt{font-size:75%}
    .orderer-paid-label{font-size:68.75%}
    
    .rest-section{margin:0 0 6px 12px;border-left-width:3px}
    .rest-header{padding:9px 12px;gap:8px}
    .rest-header-icon{font-size:81.25%}
    .rest-header-name{font-size:75%}
    .rest-header-badges{gap:6px}
    .badge{padding:2px 7px;font-size:62.5%}
    
    .order-row{padding:7px 12px;gap:8px}
    .or-date{font-size:68.75%;min-width:65px}
    .or-items{font-size:68.75%}
    .or-note{font-size:62.5%}
    .or-amt{font-size:75%;min-width:110px}
    
    .btn-pay{padding:3px 9px;font-size:62.5%}
    .btn-settle{padding:4px 12px;font-size:68.75%}
    .paid-label{font-size:62.5%;padding:3px 8px}
    
    .orderer-footer{padding:8px 12px}
    .orderer-footer-left{font-size:68.75%}
    
    .confirm-box{max-width:90%;padding:20px}
    .confirm-box h3{font-size:93.75%}
    .confirm-box p{font-size:75%}
    .confirm-amount-val{font-size:112.5%}
    .btn{padding:8px 14px;font-size:75%}
    
    .toast{bottom:16px;right:16px;padding:10px 16px;font-size:75%}
  }

  @media (max-width: 768px) {
    body{font-size:16px}
    header{padding:0 12px;height:52px;gap:8px}
    .logo{width:28px;height:28px}
    header h1{font-size:87.5%}
    header .sub{font-size:62.5%}
    .hdr-back{font-size:62.5%;padding:5px 10px;gap:4px}
    
    .scope-bar{padding:6px 12px;gap:8px;border-bottom:1px solid var(--border)}
    .scope-label{font-size:62.5%}
    .scope-chip{font-size:62.5%;padding:3px 9px}
    .scope-chip input{width:12px;height:12px}
    
    main{padding:12px;max-width:100%;margin:0 auto}
    .summary-bar{grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
    .s-card{padding:8px 10px;border-radius:8px}
    .s-card .s-lbl{font-size:50%;margin-bottom:2px}
    .s-card .s-val{font-size:93.75%}
    .s-card .s-sub{font-size:56.25%;margin-top:1px}
    
    .buyer-section{margin-bottom:12px;border-radius:6px}
    .buyer-header{flex-direction:column;align-items:flex-start;padding:8px 12px;gap:8px}
    .buyer-avatar{width:32px;height:32px;font-size:87.5%}
    .buyer-info{width:100%}
    .buyer-name{font-size:87.5%}
    .buyer-meta{font-size:62.5%}
    .buyer-totals{width:100%;gap:8px;flex-wrap:wrap}
    .buyer-total-item{flex:0 1 48%;min-width:0}
    .buyer-total-lbl{font-size:50%}
    .buyer-total-val{font-size:93.75%}
    
    .buyer-body{padding:8px;border-radius:0 0 6px 6px}
    
    .orderer-group{margin-bottom:8px;border-radius:6px;border:1px solid var(--border)}
    .orderer-header{padding:8px 12px}
    .orderer-avatar{width:26px;height:26px;font-size:68.75%}
    .orderer-name{font-size:75%}
    .orderer-unpaid-amt{font-size:68.75%}
    
    .rest-section{margin:0 0 4px 10px;border-left-width:3px;border-radius:0 4px 4px 0}
    .rest-header{padding:8px 10px;gap:6px}
    .rest-header-icon{font-size:75%}
    .rest-header-name{font-size:68.75%}
    .rest-header-badges{gap:4px;flex-wrap:wrap}
    .badge{padding:2px 6px;font-size:56.25%}
    
    .order-row{padding:6px 10px;gap:6px;flex-wrap:wrap}
    .or-date{font-size:62.5%;min-width:60px}
    .or-items{font-size:62.5%;flex-basis:100%;order:2}
    .or-note{font-size:56.25%;flex-basis:100%;order:3}
    .or-amt{font-size:68.75%;min-width:100px;order:4}
    
    .btn-pay{padding:3px 8px;font-size:56.25%;gap:3px}
    .btn-settle{padding:3px 10px;font-size:62.5%}
    .paid-label{font-size:56.25%;padding:2px 6px}
    
    .orderer-footer{padding:6px 10px;flex-direction:column;align-items:flex-start}
    .orderer-footer-left{font-size:62.5%;width:100%}
    
    .confirm-overlay{inset:0}
    .confirm-box{max-width:95%;padding:16px;border-radius:12px}
    .confirm-box h3{font-size:87.5%;margin-bottom:8px}
    .confirm-box p{font-size:68.75%;line-height:1.6;margin-bottom:12px}
    .confirm-amount{padding:8px 12px;margin-bottom:12px}
    .confirm-amount-lbl{font-size:68.75%}
    .confirm-amount-val{font-size:100%}
    .confirm-btns{gap:8px}
    .btn{padding:7px 12px;font-size:68.75%;gap:4px}
    
    .toast{bottom:12px;right:12px;padding:8px 14px;font-size:68.75%;border-radius:6px}
    
    .empty-state{padding:30px 16px;text-align:center}
    .empty-state .ei{font-size:200%;margin-bottom:10px}
    .empty-state p{font-size:75%}
  }

  @media (max-width: 480px) {
    body{font-size:14px}
    header{height:48px;padding:0 10px}
    header h1{font-size:81.25%}
    header .sub{display:none}
    .hdr-back{font-size:56.25%;padding:4px 8px}
    
    .scope-bar{padding:4px 10px;gap:6px}
    .scope-label{font-size:56.25%;display:none}
    .scope-chips{flex:1}
    .scope-chip{font-size:56.25%;padding:2px 8px}
    
    main{padding:8px}
    .summary-bar{grid-template-columns:1fr;gap:4px;margin-bottom:8px}
    .s-card{padding:6px 8px;border-radius:6px}
    .s-card .s-lbl{font-size:43.75%}
    .s-card .s-val{font-size:87.5%}
    .s-card .s-sub{font-size:50%}
    
    .buyer-section{margin-bottom:8px;border-radius:4px}
    .buyer-header{padding:6px 10px}
    .buyer-avatar{width:28px;height:28px;font-size:81.25%}
    .buyer-name{font-size:81.25%}
    .buyer-meta{font-size:56.25%;line-height:1.4}
    .buyer-totals{width:100%;gap:6px}
    .buyer-total-item{flex:1;min-width:0}
    .buyer-total-lbl{font-size:43.75%}
    .buyer-total-val{font-size:87.5%}
    
    .buyer-body{padding:6px;gap:6px}
    
    .orderer-group{margin-bottom:6px;border:1px solid var(--border);border-radius:4px}
    .orderer-header{padding:6px 10px;gap:6px}
    .orderer-avatar{width:24px;height:24px;font-size:62.5%}
    .orderer-name{font-size:68.75%}
    .orderer-unpaid-amt{font-size:62.5%}
    .orderer-paid-label{font-size:56.25%}
    
    .rest-section{margin:0 0 2px 8px;border-left-width:2px}
    .rest-header{padding:6px 8px;gap:4px}
    .rest-header-icon{font-size:68.75%}
    .rest-header-name{font-size:62.5%}
    .rest-header-badges{gap:2px;flex-wrap:wrap}
    .badge{padding:1px 5px;font-size:50%}
    
    .order-rows-wrap{border-top:none}
    .order-row{padding:4px 8px;gap:4px;font-size:13px}
    .or-date{font-size:56.25%;min-width:55px}
    .or-items{font-size:56.25%;flex-basis:100%;order:2}
    .or-note{font-size:50%;flex-basis:100%;order:3}
    .or-amt{font-size:62.5%;min-width:85px;order:4;text-align:right}
    
    .btn-pay{padding:2px 6px;font-size:50%;gap:2px}
    .btn-settle{padding:2px 8px;font-size:56.25%}
    .paid-label{font-size:50%;padding:1px 5px}
    
    .orderer-footer{padding:4px 8px;gap:6px;flex-direction:column}
    .orderer-footer-left{font-size:56.25%;width:100%}
    
    .confirm-box{max-width:98%;padding:12px;margin:10px}
    .confirm-box h3{font-size:81.25%;margin-bottom:6px}
    .confirm-box p{font-size:62.5%;line-height:1.5;margin-bottom:10px}
    .confirm-amount{padding:6px 10px;margin-bottom:10px}
    .confirm-amount-lbl{font-size:56.25%}
    .confirm-amount-val{font-size:93.75%}
    .confirm-btns{gap:6px}
    .btn{padding:6px 10px;font-size:62.5%}
    
    .toast{bottom:8px;right:8px;padding:6px 12px;font-size:62.5%;border-radius:4px;border-left-width:3px}
    
    .empty-state{padding:20px 12px}
    .empty-state .ei{font-size:150%;margin-bottom:8px}
    .empty-state p{font-size:68.75%}
  }
</style>
</head>
<body style="font-size:20px">

<header>
  <div class="logo">🧾</div>
  <h1>對帳總覽</h1>
  <span class="sub">主購專用</span>
  <a class="hdr-back" href="index.html" style="margin-left:auto;background:var(--orange);color:#fff;padding:7px 16px;border-radius:8px;font-size:81.25%;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:6px;white-space:nowrap">← 返回管理系統</a>
</header>

<!-- 餐廳篩選 -->
<div class="scope-bar">
  <span class="scope-label">篩選餐廳：</span>
  <div class="scope-chips" id="scope-chips">
    <span style="font-size:75%;color:var(--text-3)">載入中...</span>
  </div>
</div>

<main>
  <!-- 總覽統計 -->
  <div class="summary-bar" id="summary-bar"></div>

  <!-- 主購群組列表 -->
  <div id="buyer-list"></div>

  <div id="empty-state" class="empty-state" style="display:none">
    <div class="ei">🎉</div>
    <p>目前沒有未付款項目，全數結清！</p>
  </div>
</main>

<!-- 確認 Dialog -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title">確認付款</h3>
    <p id="confirm-body"></p>
    <div class="confirm-amount">
      <span class="confirm-amount-lbl" id="confirm-amount-lbl">結帳金額</span>
      <span class="confirm-amount-val" id="confirm-amount-val">NT$ 0</span>
    </div>
    <div class="confirm-btns">
      <button class="btn btn-ghost" onclick="closeConfirm()">取消</button>
      <button class="btn btn-success" onclick="doConfirm()">✔ 確認已付款</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">載入中...</div>
</div>
<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script>
// ═══════════════════ STATE ═══════════════════
let restaurants   = [];
let orders        = [];
let selectedRests = new Set();   // 勾選中的餐廳 ID
let pendingAction = null;        // { type, ids }

// ─── UI helpers ───────────────────────────────
function showLoading(msg='載入中...'){
  document.getElementById('loading-text').textContent=msg;
  document.getElementById('loading').classList.add('show');
}
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ═══════════════════ INIT ═══════════════════
async function init(){
  showLoading('連線 Database...');
  try{
    [restaurants,orders]=await Promise.all([RestaurantsAPI.getAll(),OrdersAPI.getAll()]);
    // 預選有未付款的餐廳
    const hasUnpaid=id=>orders.some(o=>o.restaurantId===id&&o.paidStatus==='未付款');
    restaurants.forEach(r=>{ if(hasUnpaid(r.id)) selectedRests.add(r.id); });
    if(selectedRests.size===0) restaurants.forEach(r=>selectedRests.add(r.id));
    buildScopeChips();
    render();
  }catch(e){ showToast('資料載入失敗：'+e.message,'error'); }
  finally{ hideLoading(); }
}

async function reloadData(){
  showLoading('更新資料...');
  try{
    [restaurants,orders]=await Promise.all([RestaurantsAPI.getAll(),OrdersAPI.getAll()]);
    buildScopeChips();
    render();
  }catch(e){ showToast('更新失敗：'+e.message,'error'); }
  finally{ hideLoading(); }
}

// ═══════════════════ SCOPE CHIPS ═══════════════════
function buildScopeChips(){
  const hasUnpaid=id=>orders.some(o=>o.restaurantId===id&&o.paidStatus==='未付款');
  // 只顯示有未付款的餐廳，按建立日期降序（最新的在前）
  const unpaidRests = restaurants.filter(r=>hasUnpaid(r.id)).sort((a,b)=>{
    const dateA = a.createdAt || '';
    const dateB = b.createdAt || '';
    return dateB.localeCompare(dateA);
  });
  document.getElementById('scope-chips').innerHTML=unpaidRests.map(r=>{
    const checked=selectedRests.has(r.id);
    return `<label class="scope-chip has-unpaid ${checked?'checked':''}" id="chip-${r.id}">
      <input type="checkbox" ${checked?'checked':''} onchange="toggleRest('${r.id}',this.checked)">
      ${esc(r.name)} ⚠
    </label>`;
  }).join('');
}
function toggleRest(id,checked){
  if(checked) selectedRests.add(id); else selectedRests.delete(id);
  document.getElementById('chip-'+id).classList.toggle('checked',checked);
  render();
}

// ═══════════════════ RENDER ═══════════════════
function getFilteredOrders(){
  return orders.filter(o=>selectedRests.has(o.restaurantId));
}

function render(){
  renderSummary();
  renderBuyerList();
}

// ── 總覽統計 ──────────────────────────────────
function renderSummary(){
  const filtered   = getFilteredOrders();
  // 每筆訂單金額加上所屬餐廳的服務費
  function orderTotal(o){
    const rest=restaurants.find(r=>r.id===o.restaurantId);
    return Number(o.amount||0)+calcFee(rest?.serviceFee||0);
  }
  const unpaidOrds  = filtered.filter(o=>o.paidStatus==='未付款');
  const totalAll    = filtered.reduce((s,o)=>s+orderTotal(o),0);
  const totalUnpaid = unpaidOrds.reduce((s,o)=>s+orderTotal(o),0);
  const buyerSet    = new Set(
    [...selectedRests].map(id=>restaurants.find(r=>r.id===id)?.receiver||'(未設定)')
  );
  const unpaidPeople= new Set(unpaidOrds.map(o=>o.orderer).filter(Boolean));
  const rests=[...selectedRests].map(id=>restaurants.find(r=>r.id===id)).filter(Boolean);
  document.getElementById('summary-bar').innerHTML=`
    <div class="s-card"><div class="s-lbl">主購人數</div><div class="s-val">${buyerSet.size} 人</div><div class="s-sub">共負責 ${rests.length} 家餐廳</div></div>
    <div class="s-card"><div class="s-lbl">涉及訂購人</div><div class="s-val">${unpaidPeople.size} 人</div><div class="s-sub">尚有未結帳</div></div>
    <div class="s-card"><div class="s-lbl">範圍總金額</div><div class="s-val" style="font-size:106.25%">NT$ ${totalAll.toLocaleString()}</div><div class="s-sub">含已付＋未付</div></div>
    <div class="s-card"><div class="s-lbl">待收合計</div>
      <div class="s-val" style="font-size:106.25%;color:${totalUnpaid>0?'var(--red)':'var(--green)'}">NT$ ${totalUnpaid.toLocaleString()}</div>
      <div class="s-sub">${totalUnpaid>0?'尚未結清':'全數已結清 🎉'}</div></div>`;
}

// ── 主購群組 ──────────────────────────────────
function renderBuyerList(){
  const container=document.getElementById('buyer-list');
  const emptyEl  =document.getElementById('empty-state');
  const filtered =getFilteredOrders();

  // 金額 helper：訂單金額 + 該餐廳服務費（固定元）
  function orderTotal(o){
    const rest=restaurants.find(r=>r.id===o.restaurantId);
    return Number(o.amount||0) + calcFee(rest?.serviceFee||0);
  }

  // 1. 以主購（receiver）分群 → 訂購人 → 餐廳
  const buyerMap={};
  filtered.forEach(o=>{
    const rest=restaurants.find(r=>r.id===o.restaurantId);
    const buyer=rest?.receiver||'(未設定收款人)';
    const orderer=o.orderer||'(未填姓名)';
    if(!buyerMap[buyer]) buyerMap[buyer]={};
    if(!buyerMap[buyer][orderer]) buyerMap[buyer][orderer]={};
    if(!buyerMap[buyer][orderer][o.restaurantId]) buyerMap[buyer][orderer][o.restaurantId]=[];
    buyerMap[buyer][orderer][o.restaurantId].push(o);
  });

  // 2. 計算金額（含服務費），只顯示有未付款的主購群組
  const buyers=Object.entries(buyerMap).map(([buyer,ordererMap])=>{
    const allOrds  =Object.values(ordererMap).flatMap(rm=>Object.values(rm).flat());
    const unpaidAmt=allOrds.filter(o=>o.paidStatus==='未付款').reduce((s,o)=>s+orderTotal(o),0);
    const totalAmt =allOrds.reduce((s,o)=>s+orderTotal(o),0);
    const restCount=new Set(allOrds.map(o=>o.restaurantId)).size;
    const ordererCount=Object.keys(ordererMap).length;
    return {buyer,ordererMap,unpaidAmt,totalAmt,restCount,ordererCount,orderCount:allOrds.length};
  }).filter(b=>b.unpaidAmt>0).sort((a,b)=>b.unpaidAmt-a.unpaidAmt);

  if(!buyers.length){ container.innerHTML=''; emptyEl.style.display='block'; return; }
  emptyEl.style.display='none';

  const BUYER_COLORS=['#1A6FBB','#16825A','#B94C0F','#6B2FA0','#117A65','#922B21','#1A5276'];
  function buyerColor(name){
    let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))&0xFFFFFF;
    return BUYER_COLORS[Math.abs(h)%BUYER_COLORS.length];
  }

  container.innerHTML=buyers.map((b,bi)=>{
    const color    =buyerColor(b.buyer);
    const bgLight  =color+'22';
    const paidAmt  =b.totalAmt-b.unpaidAmt;
    const allRests=new Set();
    Object.values(b.ordererMap).forEach(rm=>Object.keys(rm).forEach(rId=>allRests.add(rId)));
    const restNames=[...allRests].map(id=>restaurants.find(r=>r.id===id)?.name||'').filter(Boolean).join('、');

    // ── Level 2: 訂購人群組 ──
    const ordererGroupsHtml=Object.entries(b.ordererMap).sort(([nameA, restMapA], [nameB, restMapB])=>{
      const oOrdsA=Object.values(restMapA).flat();
      const oOrdsB=Object.values(restMapB).flat();
      const unpaidA = oOrdsA.filter(o=>o.paidStatus==='未付款').reduce((s,o)=>s+orderTotal(o),0);
      const unpaidB = oOrdsB.filter(o=>o.paidStatus==='未付款').reduce((s,o)=>s+orderTotal(o),0);
      // 先分組：有未付款的人在前，已全部付款的人在後
      if ((unpaidA > 0) !== (unpaidB > 0)) {
        return (unpaidA > 0) ? -1 : 1;
      }
      // 同一組內，有未付款的按金額降冪排序，已全部付款的按名字排序
      return unpaidB - unpaidA || nameA.localeCompare(nameB,'zh');
    }).map(([orderer,restMap],oi)=>{
      const allOrdrs=Object.values(restMap).flat();
      const oUnpaid   =allOrdrs.filter(o=>o.paidStatus==='未付款');
      const oPaid     =allOrdrs.filter(o=>o.paidStatus==='已付款');
      const oUnpaidAmt=oUnpaid.reduce((s,o)=>s+orderTotal(o),0);
      const oTotalAmt =allOrdrs.reduce((s,o)=>s+orderTotal(o),0);
      const hasUnpaid =oUnpaid.length>0;
      const oColor    =avatarColor(orderer);
      const bodyId    =`oo-${bi}-${oi}`;
      const chevId    =`oc-${bi}-${oi}`;

      // ── Level 3: 餐廳群組 ──
      const restGroupsHtml=Object.entries(restMap).map(([restId,rOrds],ri)=>{
        const rest         =restaurants.find(r=>r.id===restId);
        const restName     =rest?.name||'(已刪除)';
        const fee          =calcFee(rest?.serviceFee||0);
        const restUnpaid   =rOrds.filter(o=>o.paidStatus==='未付款');
        const restUnpaidAmt=restUnpaid.reduce((s,o)=>s+orderTotal(o),0);
        const restTotal    =rOrds.reduce((s,o)=>s+orderTotal(o),0);
        const allPaid      =restUnpaid.length===0;

        // 未付款的行放在前面，已付款的行放在後面
        const unpaidRows=restUnpaid.sort((a,z)=>z.orderDate.localeCompare(a.orderDate)).map(o=>{
          const amt      =Number(o.amount||0);
          const rowTotal =amt+fee;
          return `<div class="order-row">
            <span class="or-date">📅 ${o.orderDate}</span>
            <span class="or-items" title="${esc(o.items)}">${esc(o.items)||'(無品項)'}</span>
            ${o.note?`<span class="or-note">📝 ${esc(o.note)}</span>`:''}
            <span class="or-amt">NT$&nbsp;${amt.toLocaleString()}${fee>0?`<span style="font-size:56.25%;color:var(--text-3);font-weight:400"> +${fee}</span>`:''}　＝　<strong>NT$&nbsp;${rowTotal.toLocaleString()}</strong></span>
            <button class="btn-pay" onclick="askPay('${o.id}','${esc(orderer)}','${esc(restName)}',${rowTotal})">💳 付款</button>
          </div>`;
        }).join('');

        const paidRows=rOrds.filter(o=>o.paidStatus==='已付款').sort((a,z)=>z.orderDate.localeCompare(a.orderDate)).map(o=>{
          const amt      =Number(o.amount||0);
          const rowTotal =amt+fee;
          return `<div class="order-row paid-row">
            <span class="or-date">${o.orderDate}</span>
            <span class="or-items" title="${esc(o.items)}">${esc(o.items)||'(無品項)'}</span>
            ${o.note?`<span class="or-note">📝 ${esc(o.note)}</span>`:''}
            <span class="or-amt">NT$&nbsp;${amt.toLocaleString()}${fee>0?`<span style="font-size:56.25%;color:var(--text-3);font-weight:400"> +${fee}</span>`:''}　＝　<strong>NT$&nbsp;${rowTotal.toLocaleString()}</strong></span>
            <span class="paid-label">✔ 已付款</span>
          </div>`;
        }).join('');

        return `<div class="rest-section">
          <div class="rest-header">
            <span class="rest-header-icon">🍽</span>
            <span class="rest-header-name">${esc(restName)}</span>
            <div class="rest-header-badges">
              ${fee>0?`<span class="badge badge-total" style="background:var(--blue-light);color:var(--blue)">服務費 NT$ ${fee}/筆</span>`:''}
              ${!allPaid
                ?`<span class="badge badge-unpaid">未付 NT$&nbsp;${restUnpaidAmt.toLocaleString()}</span>`
                :`<span class="badge badge-paid">✔ 已結清</span>`}
              <span class="badge badge-total">合計 NT$&nbsp;${restTotal.toLocaleString()}</span>
            </div>
          </div>
          <div class="order-rows-wrap">${unpaidRows}${paidRows}</div>
        </div>`;
      }).join('');

      return `<div class="orderer-group ${!hasUnpaid?'all-paid':''}">
        <div class="orderer-header">
          <div class="orderer-avatar" style="background:${oColor}">${esc(orderer.charAt(0))}</div>
          <span class="orderer-name">${esc(orderer)}</span>
          ${hasUnpaid
            ?`<span class="orderer-unpaid-amt">未付 NT$&nbsp;${oUnpaidAmt.toLocaleString()}</span>`
            :`<span class="orderer-paid-label">✔ 已結清</span>`}
        </div>
        <div class="order-rows-wrap">${restGroupsHtml}</div>
      </div>`;
    }).join('');

    return `<div class="buyer-section">
      <div class="buyer-header" style="background:${color}">
        <div class="buyer-avatar" style="background:${bgLight};color:${color}">${esc(b.buyer.charAt(0))}</div>
        <div class="buyer-info">
          <div class="buyer-name">👤 ${esc(b.buyer)}</div>
          <div class="buyer-meta">${b.ordererCount} 人訂購・${b.restCount} 家餐廳・${b.orderCount} 筆訂單・負責：${esc(restNames)}</div>
        </div>
        <div class="buyer-totals">
          <div class="buyer-total-item">
            <div class="buyer-total-lbl">未結帳（含費）</div>
            <div class="buyer-total-val red">NT$&nbsp;${b.unpaidAmt.toLocaleString()}</div>
          </div>
          <div class="buyer-total-item">
            <div class="buyer-total-lbl">已付款</div>
            <div class="buyer-total-val green">NT$&nbsp;${paidAmt.toLocaleString()}</div>
          </div>
          <div class="buyer-total-item">
            <div class="buyer-total-lbl">總金額</div>
            <div class="buyer-total-val">NT$&nbsp;${b.totalAmt.toLocaleString()}</div>
          </div>
        </div>
      </div>
      <div class="buyer-body">${ordererGroupsHtml}</div>
    </div>`;
  }).join('');
}

function toggleRest2(bodyId, chevId){
  document.getElementById(bodyId).classList.toggle('open');
  document.getElementById(chevId).classList.toggle('open');
}

// ═══════════════════ CONFIRM ═══════════════════
function askPay(orderId, orderer, restName, amount){
  pendingAction={type:'single', ids:[orderId]};
  document.getElementById('confirm-title').textContent='確認單筆付款';
  document.getElementById('confirm-body').innerHTML=
    `訂購人：<strong>${esc(orderer)}</strong><br>餐廳：<strong>${esc(restName)}</strong><br><br>確認已收到此筆付款？`;
  document.getElementById('confirm-amount-lbl').textContent='此筆金額';
  document.getElementById('confirm-amount-val').textContent='NT$ '+amount.toLocaleString();
  document.getElementById('confirm-overlay').classList.add('open');
}

function askSettle(orderer, restId, restName){
  const unpaid=orders.filter(o=>o.restaurantId===restId&&o.orderer===orderer&&o.paidStatus==='未付款');
  const total =unpaid.reduce((s,o)=>s+Number(o.amount||0),0);
  pendingAction={type:'batch', ids:unpaid.map(o=>o.id)};
  document.getElementById('confirm-title').textContent='一鍵結清';
  document.getElementById('confirm-body').innerHTML=
    `訂購人：<strong>${esc(orderer)}</strong><br>餐廳：<strong>${esc(restName)}</strong><br>` +
    `共 <strong>${unpaid.length} 筆</strong>未付款訂單，確認全部結清？`;
  document.getElementById('confirm-amount-lbl').textContent='結清金額合計';
  document.getElementById('confirm-amount-val').textContent='NT$ '+total.toLocaleString();
  document.getElementById('confirm-overlay').classList.add('open');
}

function closeConfirm(){ pendingAction=null; document.getElementById('confirm-overlay').classList.remove('open'); }

async function doConfirm(){
  if(!pendingAction) return;
  // 先把 action 存起來，再關 modal（closeConfirm 會把 pendingAction 清為 null）
  const action = pendingAction;
  closeConfirm();
  showLoading('更新付款狀態...');
  try{
    await OrdersAPI.markPaid(action.ids);
    showToast(action.ids.length>1
      ?`已結清 ${action.ids.length} 筆訂單 ✓`
      :'已標記為付款 ✓');
    await reloadData();
  }catch(e){ showToast('錯誤：'+e.message,'error'); hideLoading(); }
}

init();
</script>
</body>
