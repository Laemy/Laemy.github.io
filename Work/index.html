<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂餐對帳系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1E3A5F;--blue:#2D7DD2;--blue-light:#EBF3FB;--blue-mid:#B8D4F0;
    --green:#1A9E5C;--green-light:#E8F8F0;--red:#E74C3C;--red-light:#FEF0EF;
    --orange:#E67E22;--bg:#F7F9FC;--surface:#FFFFFF;--border:#D9E4F0;
    --text:#1A2840;--text-2:#4A6080;--text-3:#8BA0BA;
    --radius:10px;--shadow:0 2px 12px rgba(30,58,95,0.08);--shadow-md:0 4px 24px rgba(30,58,95,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

  header{background:var(--navy);color:#fff;padding:0 32px;height:60px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
  header h1{font-size:17px;font-weight:700}
  .tab-bar{background:var(--surface);border-bottom:2px solid var(--border);padding:0 32px;display:flex}
  .tab-btn{padding:14px 22px;font-size:14px;font-weight:500;color:var(--text-2);background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;transition:color .18s,border-color .18s;white-space:nowrap}
  .tab-btn:hover{color:var(--blue)}.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
  main{flex:1;padding:28px 32px;max-width:1160px;width:100%;margin:0 auto}

  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .section-header h2{font-size:18px;font-weight:700;color:var(--navy)}
  .count-badge{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;margin-left:8px}

  .btn{padding:9px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:filter .15s,transform .1s;display:inline-flex;align-items:center;gap:6px}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
  .btn-success{background:var(--green);color:#fff}.btn-success:hover{filter:brightness(1.1)}
  .btn-ghost{background:transparent;color:var(--blue);border:1.5px solid var(--blue-mid)}.btn-ghost:hover{background:var(--blue-light)}
  .btn-danger{background:transparent;color:var(--red);border:1.5px solid #f9c4bf}.btn-danger:hover{background:#fdf0ef}
  .btn-share{background:transparent;color:var(--orange);border:1.5px solid #f5cba7}.btn-share:hover{background:#fef9f0}
  .btn-sm{padding:5px 11px;font-size:12px}

  /* Zone */
  .zone-wrap{margin-bottom:32px}
  .zone-label{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .zone-title{font-size:13px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:5px 14px;border-radius:20px;white-space:nowrap}
  .zone-unpaid .zone-title{background:var(--red-light);color:var(--red)}
  .zone-paid   .zone-title{background:var(--green-light);color:var(--green)}
  .zone-line{flex:1;height:1.5px;background:var(--border)}

  /* Cards */
  .restaurant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .restaurant-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1.5px solid var(--border);overflow:hidden;transition:box-shadow .2s,transform .2s}
  .restaurant-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
  .card-accent-unpaid{height:4px;background:linear-gradient(90deg,var(--red),#F1948A)}
  .card-accent-paid  {height:4px;background:linear-gradient(90deg,var(--green),#52BE80)}
  .card-body{padding:16px 18px 14px}
  .card-name{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px}
  .date-pill{display:inline-flex;align-items:center;gap:5px;background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:10px}
  .card-meta{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  .card-meta-row{font-size:12px;color:var(--text-2);display:flex;align-items:center;gap:6px}
  .card-note{font-size:11px;color:var(--text-3);font-style:italic;margin-bottom:12px}
  .card-actions{display:flex;gap:7px;flex-wrap:wrap}
  .card-footer{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;background:var(--bg);border-top:1px solid var(--border);gap:8px;flex-wrap:wrap}
  .order-summary{font-size:12px;color:var(--text-2)}
  .order-summary strong{color:var(--navy);font-size:13px}
  .status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .status-paid  {background:#d5f5e3;color:#1a7a4a}
  .status-unpaid{background:#fde8e6;color:#c0392b}

  /* Table */
  .table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1.5px solid var(--border);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:var(--navy);color:#fff;padding:11px 14px;text-align:left;font-size:12px;font-weight:600;letter-spacing:.4px;white-space:nowrap}
  tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--blue-light)}
  tbody td{padding:11px 14px;vertical-align:middle}
  .amount-cell{font-weight:700;color:var(--navy)}
  .restaurant-label{display:inline-flex;align-items:center;gap:6px;font-weight:600;color:var(--navy)}
  .restaurant-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
  .date-cell{display:inline-flex;align-items:center;gap:4px;background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:14px;white-space:nowrap}

  /* Accordion */
  .accordion-block{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:14px;overflow:hidden}
  .accordion-header{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;cursor:pointer;user-select:none;transition:background .15s;gap:12px}
  .accordion-header:hover{background:var(--blue-light)}
  .accordion-title{display:flex;align-items:center;gap:12px;flex:1;flex-wrap:wrap}
  .accordion-name{font-size:14px;font-weight:700;color:var(--navy)}
  .accordion-stats{display:flex;gap:8px;flex-wrap:wrap}
  .acc-stat{font-size:12px;color:var(--text-2);background:var(--bg);padding:3px 10px;border-radius:20px}
  .acc-stat span{font-weight:700;color:var(--navy)}
  .accordion-chevron{font-size:14px;color:var(--text-3);transition:transform .22s;flex-shrink:0}
  .accordion-chevron.open{transform:rotate(180deg)}
  .accordion-body{display:none;border-top:1px solid var(--border)}
  .accordion-body.open{display:block}

  /* Summary bar */
  .summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .summary-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:14px 18px;display:flex;flex-direction:column;gap:4px}
  .summary-card .s-label{font-size:11px;color:var(--text-3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .summary-card .s-value{font-size:20px;font-weight:700;color:var(--navy)}

  /* Empty */
  .empty-state{text-align:center;padding:40px 20px;color:var(--text-3)}
  .empty-state .empty-icon{font-size:36px;margin-bottom:10px}
  .empty-state p{font-size:13px}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,30,55,.45);backdrop-filter:blur(2px);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.2);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .22s ease}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-header h3{font-size:16px;font-weight:700;color:var(--navy)}
  .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-3);line-height:1}
  .modal-body{padding:18px 24px;display:flex;flex-direction:column;gap:13px}
  .modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group label{font-size:12px;font-weight:600;color:var(--text-2)}
  .form-control{padding:9px 12px;border-radius:7px;border:1.5px solid var(--border);font-size:13px;color:var(--text);background:var(--bg);transition:border-color .15s,box-shadow .15s;font-family:inherit;width:100%}
  .form-control:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,125,210,.12);background:#fff}
  .form-control[readonly]{background:#eef2f7;color:var(--text-2);cursor:default}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-static{padding:9px 12px;border-radius:7px;border:1.5px solid var(--border);font-size:13px;color:var(--text-2);background:#eef2f7}

  /* Toast */
  .toast{position:fixed;bottom:28px;right:28px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);z-index:200;transform:translateY(10px);opacity:0;transition:all .25s;pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.success{border-left:4px solid var(--green)}
  .toast.error  {border-left:4px solid var(--red)}

  /* Loading */
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);backdrop-filter:blur(2px);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px}
  .loading-overlay.show{display:flex}
  .spinner{width:36px;height:36px;border:4px solid var(--blue-mid);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;color:var(--text-2);font-weight:500}

  .view-hidden{display:none}
</style>
</head>
<body>

<header>
  <div class="logo-icon">🍱</div>
  <h1>訂餐對帳系統</h1>
  <a href="reconcile.html" style="margin-left:auto;background:var(--orange);color:#fff;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:6px;white-space:nowrap">🧾 跨餐廳對帳</a>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="restaurants">🏪 餐廳管理</button>
  <button class="tab-btn" data-tab="all-orders">📋 全部訂單</button>
  <button class="tab-btn" data-tab="by-restaurant">📊 依餐廳查看</button>
</div>

<main>
  <!-- ══ TAB: 餐廳管理 ══ -->
  <div id="tab-restaurants">
    <div class="section-header">
      <div style="display:flex;align-items:center">
        <h2>餐廳管理</h2><span class="count-badge" id="rest-count">0 家</span>
      </div>
      <button class="btn btn-primary" onclick="openRestaurantModal()">＋ 新增餐廳</button>
    </div>
    <div class="zone-wrap">
      <div class="zone-label zone-unpaid">
        <span class="zone-title">⚠ 未付款完成</span><div class="zone-line"></div>
        <span class="count-badge" id="zone-unpaid-count" style="background:var(--red-light);color:var(--red)">0 家</span>
      </div>
      <div class="restaurant-grid" id="grid-unpaid"></div>
      <div id="empty-unpaid" class="empty-state view-hidden" style="padding:20px 0 0"><p>目前無未付款餐廳 🎉</p></div>
    </div>
    <div class="zone-wrap">
      <div class="zone-label zone-paid">
        <span class="zone-title">✔ 已全數付款</span><div class="zone-line"></div>
        <span class="count-badge" id="zone-paid-count" style="background:var(--green-light);color:var(--green)">0 家</span>
      </div>
      <div class="restaurant-grid" id="grid-paid"></div>
      <div id="empty-paid" class="empty-state view-hidden" style="padding:20px 0 0"><p>尚無全數付款的餐廳</p></div>
    </div>
    <div id="rest-empty" class="empty-state view-hidden">
      <div class="empty-icon">🏪</div><p>尚無餐廳資料，請點擊右上角新增</p>
    </div>
  </div>

  <!-- ══ TAB: 全部訂單 ══ -->
  <div id="tab-all-orders" class="view-hidden">
    <div class="summary-bar" id="summary-bar"></div>
    <div class="section-header">
      <div style="display:flex;align-items:center">
        <h2>全部訂購記錄</h2><span class="count-badge" id="order-count">0 筆</span>
      </div>
      <button class="btn btn-success" onclick="openOrderModal(null)">＋ 新增訂單</button>
    </div>
    <div class="table-wrap" id="all-orders-table-wrap">
      <table>
        <thead><tr>
          <th>訂購日期</th><th>餐廳</th><th>訂購人</th><th>品項</th>
          <th>金額</th><th>服務費</th><th>收款人</th><th>付款狀態</th><th>備註</th><th style="width:80px">操作</th>
        </tr></thead>
        <tbody id="all-orders-tbody"></tbody>
      </table>
    </div>
    <div id="orders-empty" class="empty-state view-hidden">
      <div class="empty-icon">📋</div><p>尚無訂單資料</p>
    </div>
  </div>

  <!-- ══ TAB: 依餐廳查看 ══ -->
  <div id="tab-by-restaurant" class="view-hidden">
    <div class="section-header"><h2>各餐廳訂購明細</h2></div>
    <div id="by-restaurant-list"></div>
    <div id="byrest-empty" class="empty-state view-hidden">
      <div class="empty-icon">📊</div><p>尚無資料</p>
    </div>
  </div>
</main>

<!-- Modal: 餐廳 -->
<div class="modal-overlay" id="modal-restaurant">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-rest-title">新增餐廳</h3>
      <button class="modal-close" onclick="closeModal('modal-restaurant')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="rest-edit-id">
      <div class="form-group"><label>餐廳名稱 *</label><input class="form-control" id="rest-name" placeholder="例：丸龜製麵"></div>
      <div class="form-row">
        <div class="form-group"><label>聯絡電話</label><input class="form-control" id="rest-contact" placeholder="07-xxxx-xxxx"></div>
        <div class="form-group"><label>建立日期</label><input class="form-control" id="rest-date" type="date"></div>
      </div>
      <div class="form-group"><label>地址</label><input class="form-control" id="rest-address" placeholder="高雄市..."></div>
      <div class="form-row">
        <div class="form-group"><label>收款人</label><input class="form-control" id="rest-receiver" placeholder="例：王小明"></div>
        <div class="form-group"><label>服務費 (%)</label><input class="form-control" id="rest-service-fee" type="number" min="0" max="100" placeholder="0"></div>
      </div>
      <div class="form-group"><label>備註</label><textarea class="form-control" id="rest-note" rows="2" placeholder="例：每週二固定訂購"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-restaurant')">取消</button>
      <button class="btn btn-primary" onclick="saveRestaurant()">儲存</button>
    </div>
  </div>
</div>

<!-- Modal: 訂單 -->
<div class="modal-overlay" id="modal-order">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-order-title">新增訂購記錄</h3>
      <button class="modal-close" onclick="closeModal('modal-order')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="order-edit-id">
      <input type="hidden" id="order-restaurant-id-hidden">
      <div class="form-group"><label>餐廳</label><div class="form-static" id="order-restaurant-display">—</div></div>
      <div class="form-row">
        <div class="form-group"><label>訂購日期（自動帶入）</label><input class="form-control" id="order-date" type="date" readonly></div>
        <div class="form-group"><label>訂購人 *</label><input class="form-control" id="order-orderer" placeholder="例：陳小華"></div>
      </div>
      <div class="form-group"><label>訂購品項</label><input class="form-control" id="order-items" placeholder="例：烏龍麵×5、天婦羅×2"></div>
      <div class="form-row">
        <div class="form-group"><label>金額 (元)</label><input class="form-control" id="order-amount" type="number" min="0" placeholder="0"></div>
        <div class="form-group"><label>付款狀態</label>
          <select class="form-control" id="order-paid"><option value="未付款">未付款</option><option value="已付款">已付款</option></select>
        </div>
      </div>
      <div class="form-group"><label>備註</label><input class="form-control" id="order-note" placeholder="外帶 / 員工聚餐..."></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-order')">取消</button>
      <button class="btn btn-success" onclick="saveOrder()">儲存</button>
    </div>
  </div>
</div>

<!-- Modal: 分享 -->
<div class="modal-overlay" id="modal-share">
  <div class="modal" style="max-width:460px">
    <div class="modal-header">
      <h3>🔗 分享餐廳頁面</h3>
      <button class="modal-close" onclick="closeModal('modal-share')">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-size:13px;color:var(--text-2);margin-bottom:4px">
        將連結分享給同事，讓他們查看 <strong id="share-rest-name" style="color:var(--navy)"></strong> 並新增訂單。
      </div>
      <div style="background:var(--blue-light);border:1.5px solid var(--blue-mid);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:8px">
        <input id="share-url-display" type="text" readonly onclick="this.select()"
          style="flex:1;border:none;background:transparent;font-size:12px;color:var(--navy);font-family:monospace;outline:none;min-width:0">
        <button class="btn btn-primary btn-sm" onclick="copyFromModal()">複製</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-share')">關閉</button>
      <a id="share-open-link" href="#" target="_blank" class="btn btn-primary">🔗 開啟頁面</a>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">載入中...</div>
</div>

<div class="toast" id="toast"></div>

<script src="supabase.js"></script>
<script>
// ═══════════════════ UI STATE ═══════════════════
let restaurants = [];
let orders      = [];

function showLoading(msg='載入中...') {
  document.getElementById('loading-text').textContent = msg;
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ═══════════════════ TABS ═══════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    ['restaurants','all-orders','by-restaurant'].forEach(t=>{
      document.getElementById('tab-'+t).classList.toggle('view-hidden', t!==tab);
    });
    await loadData();
    if (tab==='restaurants')   renderRestaurants();
    if (tab==='all-orders')    renderAllOrders();
    if (tab==='by-restaurant') renderByRestaurant();
  });
});

// ═══════════════════ LOAD DATA ═══════════════════
async function loadData() {
  [restaurants, orders] = await Promise.all([
    RestaurantsAPI.getAll(),
    OrdersAPI.getAll()
  ]);
}

// ═══════════════════ RENDER: RESTAURANTS ═══════════════════
function hasUnpaid(restId) {
  return orders.some(o => o.restaurantId===restId && o.paidStatus==='未付款');
}

function renderRestaurants() {
  const sorted = [...restaurants].sort((a,b) => {
    const la = orders.filter(o=>o.restaurantId===a.id).map(o=>o.orderDate).sort().pop() || a.createdAt || '';
    const lb = orders.filter(o=>o.restaurantId===b.id).map(o=>o.orderDate).sort().pop() || b.createdAt || '';
    return lb.localeCompare(la);
  });
  const unpaidRests = sorted.filter(r => hasUnpaid(r.id) || orders.filter(o=>o.restaurantId===r.id).length===0);
  const paidRests   = sorted.filter(r => !hasUnpaid(r.id) && orders.filter(o=>o.restaurantId===r.id).length>0);

  document.getElementById('rest-count').textContent = restaurants.length+' 家';
  document.getElementById('zone-unpaid-count').textContent = unpaidRests.length+' 家';
  document.getElementById('zone-paid-count').textContent   = paidRests.length+' 家';
  renderCardGrid('grid-unpaid','empty-unpaid', unpaidRests,'unpaid');
  renderCardGrid('grid-paid',  'empty-paid',   paidRests,  'paid');
  document.getElementById('rest-empty').classList.toggle('view-hidden', restaurants.length>0);
}

function renderCardGrid(gridId, emptyId, rests, zone) {
  const grid=document.getElementById(gridId), empty=document.getElementById(emptyId);
  if (!rests.length) { grid.innerHTML=''; empty.classList.remove('view-hidden'); return; }
  empty.classList.add('view-hidden');
  grid.innerHTML = rests.map(r => {
    const ords     = orders.filter(o=>o.restaurantId===r.id);
    const totalAmt = ords.reduce((s,o)=>s+Number(o.amount||0),0);
    const fee      = calcFee(totalAmt, r.serviceFee);
    const unpaidN  = ords.filter(o=>o.paidStatus==='未付款').length;
    const dates    = ords.map(o=>o.orderDate).sort();
    const latest   = dates.length ? dates[dates.length-1] : r.createdAt;
    return `<div class="restaurant-card">
      <div class="${zone==='unpaid'?'card-accent-unpaid':'card-accent-paid'}"></div>
      <div class="card-body">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
          <div class="card-name">🍽 ${esc(r.name)}</div>
          <div class="date-pill"><span>📅</span>${latest||'—'}</div>
        </div>
        <div class="card-meta">
          ${r.contact  ? `<div class="card-meta-row"><span>📞</span>${esc(r.contact)}</div>` : ''}
          ${r.address  ? `<div class="card-meta-row"><span>📍</span>${esc(r.address)}</div>` : ''}
          ${r.receiver ? `<div class="card-meta-row"><span>👤</span>收款人：<strong style="color:var(--navy)">${esc(r.receiver)}</strong></div>` : ''}
          ${r.serviceFee ? `<div class="card-meta-row"><span>🧾</span>服務費：${r.serviceFee}%（NT$ ${fee.toLocaleString()}）</div>` : ''}
        </div>
        ${r.note ? `<div class="card-note">💬 ${esc(r.note)}</div>` : ''}
        <div class="card-actions">
          <button class="btn btn-success btn-sm" onclick="openOrderModal('${r.id}')">＋ 訂單</button>
          <button class="btn btn-ghost btn-sm" onclick="openRestaurantModal('${r.id}')">✏️ 編輯</button>
          <button class="btn btn-share btn-sm" onclick="showShareModal('${r.id}','${esc(r.name)}')">🔗 分享</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRestaurant('${r.id}')">🗑</button>
        </div>
      </div>
      <div class="card-footer">
        <div class="order-summary">共 <strong>${ords.length}</strong> 筆</div>
        <div class="order-summary">NT$ <strong>${totalAmt.toLocaleString()}</strong></div>
        ${unpaidN ? `<span class="status-badge status-unpaid">未付 ${unpaidN} 筆</span>`
                  : ords.length ? `<span class="status-badge status-paid">全數已付</span>`
                                : `<span class="status-badge" style="background:var(--bg);color:var(--text-3)">無訂單</span>`}
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════ RENDER: ALL ORDERS ═══════════════════
function renderAllOrders() {
  const sorted = [...orders].sort((a,b)=>b.orderDate.localeCompare(a.orderDate));
  document.getElementById('order-count').textContent = sorted.length+' 筆';
  renderSummaryBar();
  const tbody=document.getElementById('all-orders-tbody');
  const empty=document.getElementById('orders-empty');
  document.getElementById('all-orders-table-wrap').style.display = sorted.length ? '' : 'none';
  empty.classList.toggle('view-hidden', sorted.length>0);
  tbody.innerHTML = sorted.map(o => {
    const rest = restaurants.find(r=>r.id===o.restaurantId);
    const fee  = rest ? calcFee(o.amount, rest.serviceFee) : 0;
    return `<tr>
      <td><span class="date-cell">📅 ${o.orderDate}</span></td>
      <td><span class="restaurant-label"><span class="restaurant-dot"></span>${rest?esc(rest.name):'(已刪除)'}</span></td>
      <td>${esc(o.orderer)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(o.items)}">${esc(o.items)}</td>
      <td class="amount-cell">NT$ ${Number(o.amount||0).toLocaleString()}</td>
      <td style="font-size:12px;color:var(--text-2)">${fee>0?'NT$ '+fee.toLocaleString():'—'}</td>
      <td style="font-size:12px;color:var(--text-2)">${rest&&rest.receiver?esc(rest.receiver):'—'}</td>
      <td><span class="status-badge ${o.paidStatus==='已付款'?'status-paid':'status-unpaid'}">${o.paidStatus}</span></td>
      <td style="font-size:12px;color:var(--text-3)">${esc(o.note)}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="openOrderModal(null,'${o.id}')" style="margin-right:4px">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteOrder('${o.id}')">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

function renderSummaryBar() {
  const total  = orders.reduce((s,o)=>s+Number(o.amount||0),0);
  const paid   = orders.filter(o=>o.paidStatus==='已付款').reduce((s,o)=>s+Number(o.amount||0),0);
  const totalFee = orders.reduce((s,o)=>{
    const r=restaurants.find(x=>x.id===o.restaurantId);
    return s+(r?calcFee(o.amount,r.serviceFee):0);
  },0);
  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-card"><div class="s-label">餐廳數</div><div class="s-value">${restaurants.length}</div></div>
    <div class="summary-card"><div class="s-label">訂單筆數</div><div class="s-value">${orders.length}</div></div>
    <div class="summary-card"><div class="s-label">總金額</div><div class="s-value" style="font-size:17px">NT$ ${total.toLocaleString()}</div></div>
    <div class="summary-card"><div class="s-label">已付款</div><div class="s-value" style="color:var(--green);font-size:17px">NT$ ${paid.toLocaleString()}</div></div>
    <div class="summary-card"><div class="s-label">未付款</div><div class="s-value" style="color:var(--red);font-size:17px">NT$ ${(total-paid).toLocaleString()}</div></div>
    <div class="summary-card"><div class="s-label">總服務費</div><div class="s-value" style="font-size:17px">NT$ ${totalFee.toLocaleString()}</div></div>`;
}

// ═══════════════════ RENDER: BY RESTAURANT ═══════════════════
function renderByRestaurant() {
  const list=document.getElementById('by-restaurant-list'), empty=document.getElementById('byrest-empty');
  if (!restaurants.length) { list.innerHTML=''; empty.classList.remove('view-hidden'); return; }
  empty.classList.add('view-hidden');
  list.innerHTML = restaurants.map(r => {
    const ords   = [...orders.filter(o=>o.restaurantId===r.id)].sort((a,b)=>b.orderDate.localeCompare(a.orderDate));
    const total  = ords.reduce((s,o)=>s+Number(o.amount||0),0);
    const unpaid = ords.filter(o=>o.paidStatus==='未付款').length;
    return `<div class="accordion-block">
      <div class="accordion-header" onclick="toggleAcc('${r.id}')">
        <div class="accordion-title">
          <span class="accordion-name">🍽 ${esc(r.name)}</span>
          <div class="accordion-stats">
            <span class="acc-stat">訂單 <span>${ords.length}</span> 筆</span>
            <span class="acc-stat">合計 <span>NT$ ${total.toLocaleString()}</span></span>
            ${r.receiver?`<span class="acc-stat">收款人 <span>${esc(r.receiver)}</span></span>`:''}
            ${unpaid?`<span class="acc-stat" style="color:var(--red)">未付 <span style="color:var(--red)">${unpaid}</span> 筆</span>`
                    :ords.length?`<span class="acc-stat" style="color:var(--green)">✔ 全數已付</span>`:''}
          </div>
        </div>
        <span class="accordion-chevron" id="acc-chev-${r.id}">▼</span>
      </div>
      <div class="accordion-body" id="acc-body-${r.id}">
        ${ords.length===0 ? `<div class="empty-state" style="padding:24px"><p>此餐廳尚無訂單
          <button class="btn btn-success btn-sm" style="margin-left:10px" onclick="openOrderModal('${r.id}')">＋ 新增</button></p></div>`
        : `<table><thead><tr><th>訂購日期</th><th>訂購人</th><th>品項</th><th>金額</th><th>服務費</th><th>收款人</th><th>付款狀態</th><th>備註</th><th>操作</th></tr></thead>
          <tbody>${ords.map(o=>{
            const fee=calcFee(o.amount,r.serviceFee);
            return `<tr>
              <td><span class="date-cell">📅 ${o.orderDate}</span></td>
              <td>${esc(o.orderer)}</td>
              <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(o.items)}</td>
              <td class="amount-cell">NT$ ${Number(o.amount||0).toLocaleString()}</td>
              <td style="font-size:12px;color:var(--text-2)">${fee>0?'NT$ '+fee.toLocaleString():'—'}</td>
              <td style="font-size:12px;color:var(--text-2)">${esc(r.receiver)||'—'}</td>
              <td><span class="status-badge ${o.paidStatus==='已付款'?'status-paid':'status-unpaid'}">${o.paidStatus}</span></td>
              <td style="font-size:12px;color:var(--text-3)">${esc(o.note)}</td>
              <td>
                <button class="btn btn-ghost btn-sm" onclick="openOrderModal(null,'${o.id}')" style="margin-right:4px">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteOrder('${o.id}')">🗑</button>
              </td>
            </tr>`;
          }).join('')}</tbody></table>
          <div style="padding:10px 16px;text-align:right;background:var(--bg);border-top:1px solid var(--border)">
            <button class="btn btn-success btn-sm" onclick="openOrderModal('${r.id}')">＋ 新增此餐廳訂單</button>
          </div>`}
      </div>
    </div>`;
  }).join('');
}

function toggleAcc(id) {
  document.getElementById('acc-body-'+id).classList.toggle('open');
  document.getElementById('acc-chev-'+id).classList.toggle('open');
}

// ═══════════════════ MODALS ═══════════════════
function openRestaurantModal(id) {
  ['rest-edit-id','rest-name','rest-contact','rest-address','rest-receiver','rest-note'].forEach(x=>document.getElementById(x).value='');
  document.getElementById('rest-service-fee').value=0;
  document.getElementById('rest-date').value=todayStr();
  document.getElementById('modal-rest-title').textContent='新增餐廳';
  if (id) {
    const r=restaurants.find(x=>x.id===id);
    if (r) {
      document.getElementById('modal-rest-title').textContent='編輯餐廳';
      document.getElementById('rest-edit-id').value    =r.id;
      document.getElementById('rest-name').value       =r.name;
      document.getElementById('rest-contact').value    =r.contact||'';
      document.getElementById('rest-address').value    =r.address||'';
      document.getElementById('rest-receiver').value   =r.receiver||'';
      document.getElementById('rest-service-fee').value=r.serviceFee||0;
      document.getElementById('rest-note').value       =r.note||'';
      document.getElementById('rest-date').value       =r.createdAt||todayStr();
    }
  }
  document.getElementById('modal-restaurant').classList.add('open');
}

function openOrderModal(restaurantId, orderId) {
  ['order-orderer','order-items','order-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('order-amount').value='';
  document.getElementById('order-date').value=todayStr();
  document.getElementById('order-paid').value='未付款';
  document.getElementById('order-edit-id').value='';
  document.getElementById('modal-order-title').textContent='新增訂購記錄';
  let targetRestId=restaurantId;
  if (orderId) {
    const o=orders.find(x=>x.id===orderId);
    if (o) {
      document.getElementById('modal-order-title').textContent='編輯訂購記錄';
      document.getElementById('order-edit-id').value =o.id;
      document.getElementById('order-orderer').value =o.orderer||'';
      document.getElementById('order-date').value    =o.orderDate;
      document.getElementById('order-items').value   =o.items;
      document.getElementById('order-amount').value  =o.amount;
      document.getElementById('order-paid').value    =o.paidStatus;
      document.getElementById('order-note').value    =o.note||'';
      targetRestId=o.restaurantId;
    }
  }
  const rest=restaurants.find(r=>r.id===targetRestId);
  document.getElementById('order-restaurant-id-hidden').value=targetRestId||'';
  document.getElementById('order-restaurant-display').textContent=rest?rest.name:'— 請先從餐廳卡片新增 —';
  document.getElementById('modal-order').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});

// ═══════════════════ SAVE / DELETE ═══════════════════
async function saveRestaurant() {
  const name=document.getElementById('rest-name').value.trim();
  if (!name) { showToast('請輸入餐廳名稱','error'); return; }
  const editId=document.getElementById('rest-edit-id').value;
  const obj={ name, contact:document.getElementById('rest-contact').value.trim(),
    address:document.getElementById('rest-address').value.trim(),
    receiver:document.getElementById('rest-receiver').value.trim(),
    serviceFee:Number(document.getElementById('rest-service-fee').value)||0,
    note:document.getElementById('rest-note').value.trim() };
  showLoading(editId?'更新中...':'新增中...');
  try {
    if (editId) { await RestaurantsAPI.update(editId, obj); showToast('餐廳資料已更新 ✓'); }
    else { await RestaurantsAPI.insert({...obj, id:genId('r')}); showToast('餐廳新增成功 ✓'); }
    closeModal('modal-restaurant');
    await loadData(); renderRestaurants();
  } catch(e) { showToast('錯誤：'+e.message,'error'); }
  finally { hideLoading(); }
}

async function saveOrder() {
  const restId=document.getElementById('order-restaurant-id-hidden').value;
  const orderer=document.getElementById('order-orderer').value.trim();
  if (!restId)  { showToast('請從餐廳卡片新增訂單','error'); return; }
  if (!orderer) { showToast('請填寫訂購人','error'); return; }
  const editId=document.getElementById('order-edit-id').value;
  const obj={ restaurantId:restId, orderer,
    orderDate:document.getElementById('order-date').value,
    items:document.getElementById('order-items').value.trim(),
    amount:Number(document.getElementById('order-amount').value)||0,
    paidStatus:document.getElementById('order-paid').value,
    note:document.getElementById('order-note').value.trim() };
  showLoading(editId?'更新中...':'新增中...');
  try {
    if (editId) { await OrdersAPI.update(editId, obj); showToast('訂單更新成功 ✓'); }
    else { await OrdersAPI.insert({...obj, id:genId('o')}); showToast('訂單新增成功 ✓'); }
    closeModal('modal-order');
    await loadData();
    const tab=document.querySelector('.tab-btn.active').dataset.tab;
    if (tab==='all-orders')    renderAllOrders();
    else if (tab==='by-restaurant') renderByRestaurant();
    else renderRestaurants();
  } catch(e) { showToast('錯誤：'+e.message,'error'); }
  finally { hideLoading(); }
}

async function deleteRestaurant(id) {
  if (!confirm('確定刪除此餐廳？相關訂單將一併刪除。')) return;
  showLoading('刪除中...');
  try {
    await RestaurantsAPI.delete(id);
    showToast('已刪除餐廳','error');
    await loadData(); renderRestaurants();
  } catch(e) { showToast('錯誤：'+e.message,'error'); }
  finally { hideLoading(); }
}

async function deleteOrder(id) {
  if (!confirm('確定刪除此筆訂單？')) return;
  showLoading('刪除中...');
  try {
    await OrdersAPI.delete(id);
    showToast('訂單已刪除','error');
    await loadData();
    const tab=document.querySelector('.tab-btn.active').dataset.tab;
    if (tab==='all-orders')    renderAllOrders();
    else if (tab==='by-restaurant') renderByRestaurant();
    else renderRestaurants();
  } catch(e) { showToast('錯誤：'+e.message,'error'); }
  finally { hideLoading(); }
}

// ═══════════════════ SHARE ═══════════════════
function showShareModal(id, name) {
  const base=window.location.href.replace(/[^/]*$/,'');
  const url=base+'restaurant.html?id='+encodeURIComponent(id);
  document.getElementById('share-url-display').value=url;
  document.getElementById('share-rest-name').textContent=name;
  document.getElementById('share-open-link').href=url;
  document.getElementById('modal-share').classList.add('open');
}
function copyFromModal() {
  const url=document.getElementById('share-url-display').value;
  navigator.clipboard?.writeText(url).catch(()=>{});
  showToast('已複製分享連結 🔗');
}

// ═══════════════════ INIT ═══════════════════
(async () => {
  showLoading('連線 Supabase...');
  try { await loadData(); renderRestaurants(); }
  catch(e) { showToast('資料載入失敗：'+e.message,'error'); }
  finally { hideLoading(); }
})();
</script>
